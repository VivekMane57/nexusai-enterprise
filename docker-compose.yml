services:
  postgres:
    image: postgres:16-alpine
    container_name: nexusai-postgres
    restart: unless-stopped

    environment:
      POSTGRES_USER: ${POSTGRES_USER:-nexusai}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nexusai_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-nexusai}

    ports:
      - "${POSTGRES_PORT:-5433}:5432"

    volumes:
      - nexusai_postgres_data:/var/lib/postgresql/data

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-nexusai} -d ${POSTGRES_DB:-nexusai}"
        ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

    networks:
      - nexusai-network


  redis:
    image: redis:7-alpine
    container_name: nexusai-redis
    restart: unless-stopped

    command:
      - redis-server
      - --appendonly
      - "yes"

    ports:
      - "${REDIS_PORT:-6379}:6379"

    volumes:
      - nexusai_redis_data:/data

    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

    networks:
      - nexusai-network


  qdrant:
    image: qdrant/qdrant:latest
    container_name: nexusai-qdrant
    restart: unless-stopped

    ports:
      - "${QDRANT_HTTP_PORT:-6333}:6333"
      - "${QDRANT_GRPC_PORT:-6334}:6334"

    volumes:
      - nexusai_qdrant_data:/qdrant/storage

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget --quiet --tries=1 --spider http://localhost:6333/healthz || exit 1"
        ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

    networks:
      - nexusai-network


  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile

    container_name: nexusai-api
    restart: unless-stopped

    env_file:
      - .env

    environment:
      APP_ENV: ${APP_ENV:-development}

      DATABASE_URL: >-
        postgresql+psycopg2://${POSTGRES_USER:-nexusai}:${POSTGRES_PASSWORD:-nexusai_dev_password}@postgres:5432/${POSTGRES_DB:-nexusai}

      REDIS_URL: redis://redis:6379/0
      QDRANT_URL: http://qdrant:6333

      LOCAL_STORAGE_PATH: /app/storage
      DOCUMENTS_STORAGE_PATH: /app/storage/documents
      TEMPORARY_STORAGE_PATH: /app/storage/temp

    ports:
      - "${API_PORT:-8000}:8000"

    volumes:
      - ./apps/api/storage:/app/storage

    depends_on:
      postgres:
        condition: service_healthy

      redis:
        condition: service_healthy

      qdrant:
        condition: service_healthy

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl --fail http://localhost:8000/health/live || exit 1"
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

    networks:
      - nexusai-network


  worker:
    build:
      context: ./apps/api
      dockerfile: Dockerfile

    container_name: nexusai-worker
    restart: unless-stopped

    env_file:
      - .env

    environment:
      APP_ENV: ${APP_ENV:-development}

      DATABASE_URL: >-
        postgresql+psycopg2://${POSTGRES_USER:-nexusai}:${POSTGRES_PASSWORD:-nexusai_dev_password}@postgres:5432/${POSTGRES_DB:-nexusai}

      REDIS_URL: redis://redis:6379/0
      QDRANT_URL: http://qdrant:6333

      LOCAL_STORAGE_PATH: /app/storage
      DOCUMENTS_STORAGE_PATH: /app/storage/documents
      TEMPORARY_STORAGE_PATH: /app/storage/temp

    command:
      [
        "celery",
        "-A",
        "app.workers.celery_app.celery_app",
        "worker",
        "--loglevel=INFO",
        "--pool=solo"
      ]

    volumes:
      - ./apps/api/storage:/app/storage

    depends_on:
      postgres:
        condition: service_healthy

      redis:
        condition: service_healthy

      qdrant:
        condition: service_healthy

    networks:
      - nexusai-network


volumes:
  nexusai_postgres_data:
    name: nexusai-postgres-data

  nexusai_redis_data:
    name: nexusai-redis-data

  nexusai_qdrant_data:
    name: nexusai-qdrant-data


networks:
  nexusai-network:
    name: nexusai-network
    driver: bridge